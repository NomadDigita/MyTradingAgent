services:
  - type: web
    name: my-trading-agent
    env: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: TRADING_MODE
        value: paper
      - key: APPROVAL_REQUIRED
        value: "true"
      - key: MAX_LEVERAGE
        value: "20"
      - key: MAX_OPEN_POSITIONS
        value: "3"
      - key: MAX_SYMBOL_NOTIONAL
        value: "150"
      - key: MAX_PORTFOLIO_NOTIONAL
        value: "300"
      - key: MIN_SIGNAL_CONFIDENCE
        value: "0.58"
      - key: REQUIRE_STOP_LOSS
        value: "true"
      - key: APPROVAL_EXPIRY_MINUTES
        value: "15"
      - key: DEFAULT_SCAN_SYMBOLS
        value: "BTC/USDT,ETH/USDT,SOL/USDT"
      - key: AUDIT_LOG_PATH
        value: "logs/audit.jsonl"
